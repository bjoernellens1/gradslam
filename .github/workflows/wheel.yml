name: Build wheel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-wheel:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine check-wheel-contents

      - name: Build wheel
        run: |
          rm -rf build dist *.egg-info
          python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Check wheel contents
        run: |
          check-wheel-contents dist/*.whl
          unzip -l dist/*.whl | grep "gradslam/__init__.py"
          unzip -l dist/*.whl | grep "gradslam/backend/"
          unzip -l dist/*.whl | grep "gradslam/geometry/"
          unzip -l dist/*.whl | grep "gradslam/odometry/"
          unzip -l dist/*.whl | grep "gradslam/structures/"
          unzip -l dist/*.whl | grep "gradslam/py.typed"

      - name: Install wheel
        run: |
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install dist/*.whl
          python -c "import importlib.metadata as m; import gradslam; print(gradslam.__version__); print(m.version('opengradslam'))"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: opengradslam-wheel
          path: dist/*
          if-no-files-found: error
