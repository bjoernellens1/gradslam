name: CI (CPU)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (CPU PyTorch)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install -e ".[dev,optim,mesh,vis]"

      - name: Lint with ruff
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            git fetch origin "${GITHUB_BASE_REF}" --depth=1
            base_commit="$(git merge-base "origin/${GITHUB_BASE_REF}" HEAD)"
          else
            base_commit="${{ github.event.before }}"
            if [[ "${base_commit}" == "0000000000000000000000000000000000000000" ]]; then
              base_commit="$(git rev-list --max-parents=0 HEAD)"
            fi
          fi

          mapfile -t files < <(git diff --name-only --diff-filter=ACMRT "${base_commit}" HEAD -- '*.py')
          if (( ${#files[@]} == 0 )); then
            echo "No Python files changed; skipping ruff."
            exit 0
          fi

          ruff check "${files[@]}"

      - name: Test import
        run: python -c "import gradslam; print(gradslam.__version__)"

      - name: Run tests
        run: pytest -q --cov=gradslam tests/

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
