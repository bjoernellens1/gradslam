name: CI (CPU)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (CPU PyTorch)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install -e ".[dev,optim,mesh,vis]"

      - name: Lint with ruff
        run: ruff check gradslam tests

      - name: Test import
        run: python -c "import gradslam; print(gradslam.__version__)"

      - name: Run tests
        run: pytest -q --cov=gradslam tests/

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
